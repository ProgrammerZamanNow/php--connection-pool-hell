services:
  mysql:
    image: mysql:8.0
    container_name: shop_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_DATABASE: shop_db
      MYSQL_USER: shop_user
      MYSQL_PASSWORD: shop_pass
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootsecret"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - shop_net

  proxysql:
    image: proxysql/proxysql:2.7.1
    container_name: shop_proxysql
    restart: unless-stopped
    ports:
      - "6032:6032"
      - "6033:6033"
    volumes:
      - ./docker/proxysql/proxysql.cnf:/etc/proxysql.cnf:ro
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - shop_net

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST: proxysql
      DB_PORT: 6033
      DB_NAME: shop_db
      DB_USER: shop_user
      DB_PASS: shop_pass
    depends_on:
      - proxysql
    networks:
      - shop_net

  nginx:
    image: nginx:1.27-alpine
    container_name: shop_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./public:/app/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - shop_net

volumes:
  mysql_data:

networks:
  shop_net:
    driver: bridge
